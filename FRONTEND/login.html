<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SALN System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Added background image properties */
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0; /* Reset default margin */
        }
        
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); /* Slightly darker shadow for contrast */
            border: none;
            background-color: rgba(255, 255, 255, 0.9); /* Solid white with 90% opacity */
        }
    </style>
</head>

<body>
    <div class="card login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <img src="images/logo.png"
                    alt="SALN Logo"
                    width="100"
                    class="mb-3">
                <h3>SALN System</h3>
            </div>

            <div id="error-message" class="alert alert-danger d-none text-center" role="alert"></div>
            
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="login-btn">Login</button>
            </form>
        </div>
    </div>
<script src="js/login.js"></script>
</body>
</html>
